<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정 일기 - 당신의 마음을 읽어드립니다</title>
    <meta name="description" content="AI 감정 일기를 통해 당신의 하루를 기록하고 감정 분석을 받아보세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 id="main-title">오늘의 하루는 어땠나요?</h1>
            <p class="subtitle">당신의 소중한 순간들을 기록해주세요.</p>
        </header>

        <section class="diary-section">
            <div class="input-wrapper">
                <textarea id="diary-input" placeholder="여기에 일기를 작성하거나 음성으로 입력해보세요..."></textarea>
            </div>
            
            <div class="button-group">
                <button id="voice-btn" class="btn btn-secondary">
                    <span class="icon">🎙️</span> 음성으로 입력하기
                </button>
                <button id="analyze-btn" class="btn btn-primary">
                    <span class="icon">✨</span> 분석 요청하기
                </button>
            </div>
        </section>

        <section class="result-section">
            <h2 class="sub-title">AI의 답변</h2>
            <div id="ai-response-box" class="response-box">
                <p id="ai-response-text">여기에 AI의 답변이 표시됩니다.</p>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
