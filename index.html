<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정 일기 - 당신의 마음을 읽어드립니다</title>
    <meta name="description" content="AI 감정 일기를 통해 당신의 하루를 기록하고 감정 분석을 받아보세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Login Screen -->
    <main class="container" id="login-container">
        <header class="header">
            <h1>AI 감정 일기</h1>
            <p class="subtitle">마음을 기록하고 AI와 대화해보세요.</p>
        </header>
        
        <div class="login-form">
            <div class="input-wrapper">
                <input type="email" id="email-input" class="auth-input" placeholder="이메일 주소" />
            </div>
            <div class="input-wrapper">
                <input type="password" id="password-input" class="auth-input" placeholder="비밀번호" />
            </div>
            <div class="button-group auth-buttons">
                <button id="login-btn" class="btn btn-primary">로그인</button>
                <button id="signup-btn" class="btn btn-secondary">회원가입</button>
            </div>
            
            <div class="divider">
                <span>또는</span>
            </div>
            
            <button id="google-login-btn" class="btn btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" class="google-icon" />
                Google로 로그인
            </button>
        </div>
    </main>

    <!-- Main App Screen (Hidden by default) -->
    <main class="container" id="app-container" style="display: none;">
        <header class="header app-header">
            <div class="header-titles">
                <h1 id="main-title">오늘의 하루는 어땠나요?</h1>
                <p class="subtitle">당신의 소중한 순간들을 기록해주세요.</p>
            </div>
            <div class="user-info">
                <span id="user-email" class="user-email"></span>
                <button id="logout-btn" class="btn-logout">로그아웃</button>
            </div>
        </header>

        <section class="diary-section">
            <div class="input-wrapper">
                <textarea id="diary-input" placeholder="여기에 일기를 작성하거나 음성으로 입력해보세요..."></textarea>
            </div>
            
            <div class="button-group">
                <button id="voice-btn" class="btn btn-secondary">
                    <span class="icon">🎙️</span> 음성으로 입력하기
                </button>
                <button id="analyze-btn" class="btn btn-primary">
                    <span class="icon">✨</span> 분석 요청하기
                </button>
            </div>
        </section>

        <section class="result-section">
            <h2 class="sub-title">AI의 답변</h2>
            <div id="ai-response-box" class="response-box">
                <p id="ai-response-text">여기에 AI의 답변이 표시됩니다.</p>
            </div>
        </section>

        <section class="history-section">
            <h2 class="sub-title">나의 일기 히스토리</h2>
            <div id="history-list" class="history-list">
                <p class="loading-history">히스토리를 불러오는 중...</p>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
